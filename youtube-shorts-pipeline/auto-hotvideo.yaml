# 视频生成工具 v2.1

## 功能说明

**直接输入文案生成视频，无热点选题、无文案生成。**

用户输入文案 → 直接生成视频

## 锁定参数

| 参数 | 值 | 说明 |
|------|-----|------|
| 图片数量 | 0 | 默认不生成新素材 |
| 字幕字号 | 125 | 强制锁定 |
| TTS音色 | qwen-tts-vd-bailian-voice-20260510160239061-ba05 | 百炼自定义 |
| 输出路径 | local_assets/images/{niche}/成品视频/ | 唯一输出 |

## 执行命令

```bash
cd /Users/yezhong/youtube-shorts-pipeline && python3 auto-hotvideo.py make "文案" --skip-approval --json
```

## 输入格式

`【文案】（风格:xxx，图片:N）`

- **文案**：【】内的内容，100%使用用户输入，禁止LLM改写
- **风格**：business/viral/knowledge/emotion/horror/general（可选，默认general）
- **图片**：0-10（可选，默认0）

## 执行流程

1. 用户输入文案
2. 直接执行生成（无热点选题、无文案生成）
3. 成本审批（仅当图片>0）
4. 生成视频
5. 打开视频

## 禁止事项

- 禁止LLM改写文案
- 禁止热点选题
- 禁止文案生成
- 禁止默认生成新素材
- 禁止绕过此配置直接调用管线
- 禁止失败时使用替代方案

## 自动化模式

一旦触发，OpenClaw不再介入修改，直到任务完成或失败。