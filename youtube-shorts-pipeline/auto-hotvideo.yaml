# 视频生成工具 v2.0

## 锁定参数

| 参数 | 值 | 说明 |
|------|-----|------|
| 图片数量 | 0 | 默认不生成新素材 |
| 字幕字号 | 125 | 强制锁定 |
| TTS音色 | qwen-tts-vd-bailian-voice-20260510160239061-ba05 | 百炼自定义 |
| 输出路径 | local_assets/images/{niche}/成品视频/ | 唯一输出 |

## 执行命令

```bash
cd /Users/yezhong/youtube-shorts-pipeline && python3 auto-hotvideo.py "$@"
```

## 执行流程

### 第1步：解析输入

用户输入：`【文案】（风格:xxx，图片:N）`

- 【】内为文案，100%使用用户输入，禁止LLM改写
- 风格：business/viral/knowledge/emotion/horror/general
- 图片：0-10，默认0

### 第2步：成本审批（仅当图片>0）

显示成本，等待用户输入"同意"。

其他任何字符一律无效，任务终止。

### 第3步：执行

```bash
python3 auto-hotvideo.py make "【文案】" --skip-approval --json
```

成功→打开视频。失败→报错终止，禁止替代方案。

## 禁止事项

- 禁止LLM改写文案
- 禁止默认生成新素材
- 禁止绕过此配置直接调用管线
- 禁止失败时使用替代方案
- 禁止非"同意"审批

## 自动化模式

一旦触发，OpenClaw不再介入修改，直到任务完成或失败。
